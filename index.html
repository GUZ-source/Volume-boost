<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NAM Tone Booster</title>
    <style>
        :root { --bg: #121214; --accent: #ff7000; }
        body { background: var(--bg); color: #e1e1e6; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #202024; padding: 30px; border-radius: 12px; }
        .pro-panel { display: none; background: #2a2a2e; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--accent); }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h2>NAM Tone Booster</h2>
    <div id="dropzone" style="padding: 30px; border: 2px dashed #444; text-align: center; cursor: pointer; margin-top:20px;">Clique ou arraste o .nam aqui</div>
    
    <div id="workspace" style="display:none;">
        <p>Arquivo: <b id="fileName"></b></p>
        
        <label>Master Volume (Head Scale): <b id="headVal">1.0x</b></label>
        <input type="range" id="headSlider" min="0.1" max="16" step="0.1" value="1" style="width:100%">

        <button id="togglePro" style="background:#444; margin-top:10px;">Ativar Modo PRO (Ajuste de Loudness)</button>

        <div id="proPanel" class="pro-panel">
            <label>Ajuste de Loudness (dB): <b id="loudVal">0.0 dB</b></label>
            <input type="range" id="loudSlider" min="-24" max="24" step="0.5" value="0" style="width:100%">
        </div>

        <button id="btnDownload">Baixar Arquivo Modificado</button>
    </div>
</div>

<script>
    let rawJson = null;
    const dropzone = document.getElementById('dropzone'), workspace = document.getElementById('workspace');
    const proPanel = document.getElementById('proPanel'), togglePro = document.getElementById('togglePro');
    
    // Upload
    dropzone.onclick = () => {
        const input = document.createElement('input'); input.type = 'file'; input.accept = '.nam';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                rawJson = JSON.parse(ev.target.result);
                document.getElementById('fileName').textContent = e.target.files[0].name;
                dropzone.style.display = 'none'; workspace.style.display = 'block';
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    };

    // Toggle PRO
    togglePro.onclick = () => {
        proPanel.style.display = (proPanel.style.display === 'block') ? 'none' : 'block';
        togglePro.textContent = (proPanel.style.display === 'block') ? 'Ocultar Modo PRO' : 'Ativar Modo PRO (Ajuste de Loudness)';
    };

    // UI Updates
    document.getElementById('headSlider').oninput = (e) => document.getElementById('headVal').textContent = e.target.value + 'x';
    document.getElementById('loudSlider').oninput = (e) => document.getElementById('loudVal').textContent = e.target.value + ' dB';

    // Download
    document.getElementById('btnDownload').onclick = () => {
        let exportJson = JSON.parse(JSON.stringify(rawJson));
        const hF = parseFloat(document.getElementById('headSlider').value);
        const lO = parseFloat(document.getElementById('loudSlider').value);

        const apply = (block) => {
            block.config.head_scale *= hF;
            block.weights[block.weights.length - 1] *= hF;
            block.metadata.loudness += lO;
        };

        if (exportJson.architecture === "WaveNet") apply(exportJson);
        else if (exportJson.architecture === "SlimmableContainer") {
            exportJson.config.submodels.forEach(s => apply(s.model));
            exportJson.metadata.loudness += lO;
        }

        const dl = document.createElement('a');
        dl.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportJson, null, 4));
        dl.download = "NAM_MODIFIED.nam";
        dl.click();
    };
</script>
</body>
</html>
