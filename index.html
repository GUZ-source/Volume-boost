<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM & IR Tone Booster</title>
    <script src="https://cdn.jsdelivr.net/npm/audiobuffer-to-wav@1.0.0/index.min.js"></script>
    <style>
        :root {
            --bg-color: #121214; --card-bg: #202024; --card-border: #323238;
            --accent: #ff7000; --accent-hover: #e06200; --text-main: #e1e1e6;
            --text-muted: #8d8d99; --danger: #f75a68; --warning: #f1c40f; --success: #04d361;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-size: 1.8rem; margin-bottom: 6px; }
        header h1 span { color: var(--accent); }
        .dropzone { border: 2px dashed var(--card-border); border-radius: 8px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); transition: all 0.2s; }
        .dropzone:hover { border-color: var(--accent); }
        #workspace { display: none; }
        .file-badge { background: #18181b; padding: 12px 16px; border-radius: 6px; border-left: 4px solid var(--accent); margin-bottom: 24px; font-size: 0.9rem; word-break: break-all; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-muted); font-weight: bold; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .panel { display: none; padding: 15px 0; }
        .panel.active { display: block; }
        .slider-group { margin-bottom: 20px; }
        .slider-group label { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 12px; }
        .val-display { color: var(--accent); font-size: 1.2rem; font-weight: 800; }
        input[type=range] { width: 100%; height: 6px; accent-color: var(--accent); }
        .pro-warning { background: rgba(247, 90, 104, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .stat-box { background: rgba(0,0,0,0.25); padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box .label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .stat-box .new { color: var(--success); font-weight: bold; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>NAM <span>Tone Booster</span></h1></header>

    <div class="dropzone" id="dropzone">
        <p>📂 Arraste seu arquivo .nam ou .wav</p>
        <input type="file" id="fileInput" accept=".nam,.json,.wav" style="display:none">
    </div>

    <div id="workspace">
        <div class="file-badge">📄 <b id="uiFileName"></b></div>

        <div class="tabs">
            <div class="tab active" id="tabSafe">Safe</div>
            <div class="tab" id="tabPro">PRO</div>
            <div class="tab" id="tabIR">IR Booster</div>
        </div>

        <div class="panel active" id="safePanel">
            <div class="slider-group">
                <label>Boost (dB) <span class="val-display" id="safeVal">+0.0 dB</span></label>
                <input type="range" id="safeSlider" min="-24" max="20" step="0.5" value="0">
            </div>
            <button class="btn btn-primary" id="btnDownload">Baixar .nam</button>
        </div>

        <div class="panel" id="proPanel">
            <div class="slider-group">
                <label>Head Scale <span class="val-display" id="proHeadVal">1.0x</span></label>
                <input type="range" id="proHeadSlider" min="0.1" max="24.0" step="0.1" value="1.0">
            </div>
            <button class="btn btn-primary" id="btnDownloadPro">Baixar .nam PRO</button>
        </div>

        <div class="panel" id="irPanel">
            <div class="slider-group">
                <label>Gain (dB) <span class="val-display" id="irVal" style="color:var(--success)">+0.0 dB</span></label>
                <input type="range" id="irSlider" min="-12" max="12" step="0.5" value="0">
            </div>
            <button class="btn btn-primary" id="btnDownloadIR" style="background:var(--success)">Processar e Baixar .wav</button>
        </div>
    </div>
</div>

<script>
    // Referências e Lógica de Navegação
    const dropzone = document.getElementById('dropzone'), workspace = document.getElementById('workspace');
    
    function switchTab(tabId) {
        ['safePanel', 'proPanel', 'irPanel'].forEach(id => document.getElementById(id).classList.remove('active'));
        ['tabSafe', 'tabPro', 'tabIR'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(tabId.replace('tab', '') + 'Panel').classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    document.getElementById('tabSafe').onclick = () => switchTab('tabSafe');
    document.getElementById('tabPro').onclick = () => switchTab('tabPro');
    document.getElementById('tabIR').onclick = () => switchTab('tabIR');

    // Lógica IR (WAV)
    document.getElementById('irSlider').oninput = (e) => document.getElementById('irVal').textContent = (e.target.value > 0 ? "+" : "") + e.target.value + " dB";

    document.getElementById('btnDownloadIR').addEventListener('click', async () => {
        const file = fileInput.files[0];
        const buffer = await file.arrayBuffer();
        const ctx = new AudioContext();
        const audioBuf = await ctx.decodeAudioData(buffer);
        const gain = Math.pow(10, parseFloat(document.getElementById('irSlider').value) / 20);
        const data = audioBuf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] *= gain;
        
        const wav = audioBufferToWav(audioBuf);
        const url = URL.createObjectURL(new Blob([new DataView(wav)], { type: 'audio/wav' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name.replace('.wav', '') + "_boosted.wav";
        a.click();
    });

    // ... (Mantenha sua lógica original de processamento de NAM abaixo)
    // Dica: Certifique-se de que sua função 'processFile' original lide com ambos os tipos de arquivo.
    
    dropzone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        document.getElementById('uiFileName').textContent = file.name;
        dropzone.style.display = 'none';
        workspace.style.display = 'block';
        if(file.name.endsWith('.nam')) { /* sua lógica de parse JSON aqui */ }
    };
</script>
</body>
</html>
