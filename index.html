<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM Tone Booster | Editor de Ganho</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --card-border: #323238;
            --accent: #ff7000;
            --accent-hover: #e06200;
            --text-main: #e1e1e6;
            --text-muted: #8d8d99;
            --success: #04d361;
            --danger: #f75a68;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 680px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 28px; }
        .dropzone { border: 2px dashed var(--card-border); border-radius: 8px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); }
        #workspace { display: none; }
        .control-group { margin-bottom: 28px; }
        .control-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .val-display { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .slider-row { display: flex; gap: 15px; align-items: center; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent); height: 6px; }
        .btn-download { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .stat-box { background: rgba(0,0,0,0.25); padding: 14px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>NAM <span>Tone Booster</span></h1></header>

    <div class="dropzone" id="dropzone">
        <p>📂 Clique aqui ou arraste seu arquivo .nam</p>
        <input type="file" id="fileInput" accept=".nam,.json" style="display:none">
    </div>

    <div id="workspace">
        <div class="control-group">
            <div class="control-header">
                <label>Ajuste de Ganho (Loudness)</label>
                <div class="val-display" id="uiGainText">0.0 dB</div>
            </div>
            <div class="slider-row">
                <span>-24dB</span>
                <input type="range" id="gainSlider" min="-24" max="36" step="1.0" value="0">
                <span>+36dB</span>
            </div>
            <div style="margin-top: 10px;">
                <input type="checkbox" id="keepMetadata">
                <label for="keepMetadata" style="font-size: 0.85rem; color: var(--text-muted);">Manter Metadados Originais</label>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><div class="label">Head Scale</div><div class="values"><span id="oldHead"></span> -> <span id="newHead"></span></div></div>
            <div class="stat-box"><div class="label">Metadata Loudness</div><div class="values"><span id="oldLoud"></span> -> <span id="newLoud"></span></div></div>
        </div>

        <button class="btn-download" id="btnDownload">Baixar Modelo Modificado</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput'), dropzone = document.getElementById('dropzone'), workspace = document.getElementById('workspace'), gainSlider = document.getElementById('gainSlider'), btnDownload = document.getElementById('btnDownload');
    let rawJson = null, originalName = "";

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    gainSlider.addEventListener('input', updateCalculations);

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => { rawJson = JSON.parse(e.target.result); originalName = file.name; dropzone.style.display = 'none'; workspace.style.display = 'block'; updateCalculations(); };
        reader.readAsText(file);
    }

    function updateCalculations() {
        const db = parseFloat(gainSlider.value);
        const factor = Math.pow(10, db / 20);
        document.getElementById('uiGainText').textContent = `${db > 0 ? "+" : ""}${db.toFixed(1)} dB`;
        // (Lógica de exibição simplificada para o teste)
    }

    btnDownload.addEventListener('click', () => {
        const db = parseFloat(gainSlider.value), factor = Math.pow(10, db / 20), keepMeta = document.getElementById('keepMetadata').checked;
        const exportJson = JSON.parse(JSON.stringify(rawJson));
        
        const applyWaveNetBoost = (block) => {
            block.config.head_scale *= factor;
            block.weights[block.weights.length - 1] *= factor;
            if (!keepMeta) block.metadata.loudness += db;
        };

        if (exportJson.architecture === "WaveNet") applyWaveNetBoost(exportJson);
        else if (exportJson.architecture === "SlimmableContainer") {
            exportJson.config.submodels.forEach(sub => applyWaveNetBoost(sub.model));
            if (!keepMeta) exportJson.metadata.loudness += db;
        }

        const dl = document.createElement('a');
        dl.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportJson, null, 4));
        dl.download = originalName.replace(".nam", `_${db > 0 ? "+" : ""}${db}dB.nam`);
        dl.click();
    });
</script>
</body>
</html>
