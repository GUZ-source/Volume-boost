<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NAM & IR Tone Booster</title>
    <script src="https://cdn.jsdelivr.net/npm/audiobuffer-to-wav@1.0.0/index.min.js"></script>
    <style>
        /* (Mantenha todo o seu CSS aqui, ele estava ótimo!) */
        :root { --bg-color: #121214; --card-bg: #202024; --card-border: #323238; --accent: #ff7000; --text-main: #e1e1e6; --text-muted: #8d8d99; --success: #04d361; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 32px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-muted); font-weight: bold; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .panel { display: none; }
        .panel.active { display: block; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tone Booster</h1>
    <input type="file" id="fileInput" accept=".nam,.json,.wav">
    
    <div class="tabs">
        <div class="tab active" id="tabNAM">NAM</div>
        <div class="tab" id="tabIR">IR Booster</div>
    </div>

    <div class="panel active" id="namPanel">
        <input type="range" id="namSlider" min="-24" max="24" value="0">
        <button class="btn btn-primary" id="btnDownloadNAM">Baixar .nam</button>
    </div>

    <div class="panel" id="irPanel">
        <input type="range" id="irSlider" min="-12" max="12" value="0">
        <button class="btn btn-primary" id="btnDownloadIR" style="background: var(--success);">Processar e Baixar .wav</button>
    </div>
</div>

<script>
    // Lógica de Abas
    document.getElementById('tabNAM').onclick = () => {
        document.getElementById('namPanel').classList.add('active');
        document.getElementById('irPanel').classList.remove('active');
    };
    document.getElementById('tabIR').onclick = () => {
        document.getElementById('namPanel').classList.remove('active');
        document.getElementById('irPanel').classList.add('active');
    };

    // Lógica IR Booster usando a lib CDN
    document.getElementById('btnDownloadIR').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert("Selecione um arquivo!");
        
        const arrayBuffer = await fileInput.files[0].arrayBuffer();
        const audioCtx = new AudioContext();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        const gain = Math.pow(10, parseFloat(document.getElementById('irSlider').value) / 20);
        const data = audioBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] *= gain;

        // Gerar arquivo WAV com a biblioteca externa
        const wav = audioBufferToWav(audioBuffer);
        const blob = new Blob([new DataView(wav)], { type: 'audio/wav' });
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "ir_boosted.wav";
        a.click();
    });
</script>
</body>
</html>
